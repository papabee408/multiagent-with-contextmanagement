name: AI Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      full_project_checks:
        description: Run full project checks in addition to the fast gate
        required: false
        default: false
        type: boolean

concurrency:
  group: ai-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ai-gate:
    name: AI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Gate
        run: bash scripts/ci/run-ai-gate.sh
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_REF_NAME: ${{ github.ref_name }}
          CI_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          CI_DIFF_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          CI_RUN_FULL_PROJECT_CHECKS: ${{ github.event_name == 'workflow_dispatch' && inputs.full_project_checks }}
